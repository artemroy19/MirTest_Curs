name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mirtest_test
          POSTGRES_USER: mirtest
          POSTGRES_PASSWORD: mirtest_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mirtest -d mirtest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://mirtest:mirtest_password@localhost:5432/mirtest_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      CSRF_TRUSTED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python manage.py test

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build
